name: Weekly Model Update

'on':
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-models:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Refresh model database
        run: python3 scripts/scrape_hf_models.py

      - name: Validate generated JSON
        run: |
          python3 -m json.tool data/hf_models.json > /dev/null
          python3 -m json.tool llmfit-core/data/hf_models.json > /dev/null

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate against JSON Schema
        run: cargo test -p llmfit-core hf_models_match_schema

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore(models): daily model data refresh"
          title: "[Automated] Daily model data refresh"
          body: |
            Automated daily refresh of model metadata generated by `scripts/scrape_hf_models.py`.
          branch: automated/daily-model-update
          delete-branch: true
          labels: |
            automated
            data-update
